services:
  postgres:
    image: postgres:16-alpine
    container_name: tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutorpass
      POSTGRES_DB: tutor_dev
    ports:
      - "5432:5432"
    volumes:
      - tutor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d tutor_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tutor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  tutor_pg_data:
